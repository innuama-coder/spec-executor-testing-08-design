version: "2.3"
name: "design-lld-execution-summary"
repo:
  url: "https://github.com/innuama-coder/spec-executor-testing-08-design.git"
  branch: "main"
task_dir: "tasks/lld"
deliverables:
- path: "outputs/LLD.md"
  verify: "test -s outputs/PRD.md && test -s outputs/HLD.md && test -s outputs/LLD.md
    && grep -q \"LLD\" outputs/LLD.md && grep -q \"接口\" outputs/LLD.md && grep -q
    \"测试\" outputs/LLD.md"
execution:
  executor: "codex"
  poll_interval_sec: 2
  idle_timeout_sec: 90
  max_consecutive_escalate: 2
  agent:
    name: "lld-design-agent"
    role: "按 PRD/HLD 生成 LLD，保证接口、测试和实现边界完整。"
    instructions:
      primary: PROMPT.md
      system: AGENTS.md
      additional:
      - "CLAUDE.md"
    context:
    - path: "PROMPT.md"
      required: true
    - path: "AGENTS.md"
      required: true
    - path: "CLAUDE.md"
      required: true
    tools:
      allow:
      - "shell"
      - "apply_patch"
      deny:
      - "network"
    permissions:
      sandbox: "workspace-write"
      approval: "on-request"
      network: false
    model:
      preferred: "default"
  review:
    max_iterations: 2
    items:
    - id: "REV-LLD-001"
      source: "external-review"
      severity: "must"
      target: "outputs/LLD.md"
      issue: "LLD 必须包含接口和测试设计。"
      expected_fix: "补齐接口、测试、边界条件和验收说明。"
      acceptance: "grep -q \"接口\" outputs/LLD.md && grep -q \"测试\" outputs/LLD.md"
verification:
  commands:
  - "test -s outputs/PRD.md"
  - "test -s outputs/HLD.md"
  - "test -s outputs/LLD.md"
  - "grep -q \"接口\" outputs/LLD.md"
  - "grep -q \"测试\" outputs/LLD.md"
reporting:
  include_evidence_refs: true
  handoff_required: true
package:
  env:
    path: "ENV"
    required: false
