version: "2.3"
name: "design-lld-execution-summary"
repo:
  url: "https://github.com/innuama-coder/spec-executor-testing-08-design.git"
  branch: "main"
task_dir: "tasks/lld"
executor: "codex"
execution:
  poll_interval_sec: 2
  idle_timeout_sec: 90
  max_duration_min: 15
  max_nudge_count: 3
  max_consecutive_escalate: 2
  env:
    file: "ENV"
    required: false
    privacy: "redacted"
  agent:
    id: "lld-design-agent"
    name: "lld-design-agent"
    role: "按 PRD/HLD 生成 LLD，保证接口、测试和实现边界完整。"
    model:
      preference: "default"
    instructions:
      - "Codex LLD Agent、review 迭代、设计任务包上下文。"
      - "严格遵守任务包中的 PROMPT、AGENTS、CLAUDE 与 docs 上下文。"
      - "ENV 仅用于进程环境注入，不得作为上下文文件读取或在默认输出中泄漏变量值。"
      - "若存在 review items，必须在同一 JOB 内完成修复、验证和交付说明更新。"
    context:
      files:
        - "PROMPT.md"
        - "AGENTS.md"
        - "CLAUDE.md"
      exclude:
        - "ENV"
    tools:
      allow:
        - "shell"
        - "apply_patch"
      deny:
        - "network"
    permissions:
      filesystem: "workspace-write"
      network: "deny"
      approval: "on-request"
  review:
    max_iterations: 2
    items:
      - id: "REV-LLD-001"
        source: "external-review"
        severity: "must"
        target: "outputs/LLD.md"
        description: "LLD 必须包含接口和测试设计。"
        expected_fix: "补齐接口、测试、边界条件和验收说明。"
        evidence_refs:
          - "PROMPT.md"
        acceptance:
          command: "grep -q \"接口\" outputs/LLD.md && grep -q \"测试\" outputs/LLD.md"
  lifecycle:
    resume:
      require_same_job: true
    monitoring:
      busy_side_effect: "observe_only"
      source_degraded_policy: "bounded_failure"
      screen_capture_semantic_fallback: false
    capture:
      default_raw_output: false
      failure_evidence: true
verification:
  pass_threshold: 1
  commands:
    - "test -s outputs/PRD.md"
    - "test -s outputs/HLD.md"
    - "test -s outputs/LLD.md"
    - "grep -q \"接口\" outputs/LLD.md"
    - "grep -q \"测试\" outputs/LLD.md"
reporting:
  format: "markdown"
  include_evidence_refs: true
  redact_env_values: true
  include_handoff: true
deliverables:
  - path: "outputs/LLD.md"
    verify: "test -s outputs/PRD.md && test -s outputs/HLD.md && test -s outputs/LLD.md && grep -q \"LLD\" outputs/LLD.md && grep -q \"接口\" outputs/LLD.md && grep -q \"测试\" outputs/LLD.md"
