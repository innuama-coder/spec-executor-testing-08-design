version: "2.0"
name: "design-lld-execution-summary"
repo:
  url: "https://github.com/innuama-coder/spec-executor-testing-08-design.git"
  branch: "main"
task_dir: "tasks/lld"
executor: "codex"
deliverables:
  - path: "outputs/LLD.md"
    verify: "test -s outputs/PRD.md && test -s outputs/HLD.md && test -s outputs/LLD.md && grep -q \"LLD\" outputs/LLD.md && grep -q \"接口\" outputs/LLD.md && grep -q \"测试\" outputs/LLD.md"
execution:
  poll_interval_sec: 2
  idle_timeout_sec: 90
  max_duration_min: 15
  max_nudge_count: 3
  max_consecutive_escalate: 2
