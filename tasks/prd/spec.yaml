version: "2.3"
name: "design-prd-execution-summary"
repo:
  url: "https://github.com/innuama-coder/spec-executor-testing-08-design.git"
  branch: "main"
task_dir: "tasks/prd"
deliverables:
- path: "outputs/PRD.md"
  verify: "test -s outputs/PRD.md && grep -q \"PRD\" outputs/PRD.md && grep -q \"\
    修订\" outputs/PRD.md && grep -q \"FR\" outputs/PRD.md && grep -q \"NFR\" outputs/PRD.md
    && grep -q \"验收\" outputs/PRD.md"
execution:
  executor: "claude"
  poll_interval_sec: 2
  idle_timeout_sec: 90
  max_consecutive_escalate: 2
  agent:
    name: "prd-design-agent"
    role: "按任务包生成 PRD，保证需求、验收与非功能约束完整。"
    instructions:
      primary: PROMPT.md
      system: AGENTS.md
      additional:
      - "CLAUDE.md"
    context:
    - path: "PROMPT.md"
      required: true
    - path: "AGENTS.md"
      required: true
    - path: "CLAUDE.md"
      required: true
    tools:
      allow:
      - "shell"
      - "apply_patch"
      deny:
      - "network"
    permissions:
      sandbox: "workspace-write"
      approval: "on-request"
      network: false
    model:
      preferred: "default"
  review:
    max_iterations: 2
    items:
    - id: "REV-PRD-001"
      source: "external-review"
      severity: "must"
      target: "outputs/PRD.md"
      issue: "PRD 必须包含 FR、NFR 与验收章节。"
      expected_fix: "补齐 FR、NFR、验收标准和修订记录。"
      acceptance: "grep -q \"FR\" outputs/PRD.md && grep -q \"NFR\" outputs/PRD.md
        && grep -q \"验收\" outputs/PRD.md"
verification:
  commands:
  - "test -s outputs/PRD.md"
  - "grep -q \"PRD\" outputs/PRD.md"
  - "grep -q \"FR\" outputs/PRD.md"
  - "grep -q \"NFR\" outputs/PRD.md"
  - "grep -q \"验收\" outputs/PRD.md"
reporting:
  include_evidence_refs: true
  handoff_required: true
package:
  env:
    path: "ENV"
    required: false
