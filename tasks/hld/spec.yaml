version: "2.3"
name: "design-hld-execution-summary"
repo:
  url: "https://github.com/innuama-coder/spec-executor-testing-08-design.git"
  branch: "main"
task_dir: "tasks/hld"
deliverables:
- path: "outputs/HLD.md"
  verify: "test -s outputs/PRD.md && test -s outputs/HLD.md && grep -q \"HLD\" outputs/HLD.md
    && grep -q \"数据流\" outputs/HLD.md && grep -q \"ADR\" outputs/HLD.md"
execution:
  executor: "claude"
  poll_interval_sec: 2
  idle_timeout_sec: 90
  max_consecutive_escalate: 2
  agent:
    name: "hld-design-agent"
    role: "按 PRD 生成 HLD，保证数据流、架构决策和边界清晰。"
    instructions:
      primary: PROMPT.md
      system: AGENTS.md
      additional:
      - "CLAUDE.md"
    context:
    - path: "PROMPT.md"
      required: true
    - path: "AGENTS.md"
      required: true
    - path: "CLAUDE.md"
      required: true
    tools:
      allow:
      - "shell"
      - "apply_patch"
      deny:
      - "network"
    permissions:
      sandbox: "workspace-write"
      approval: "on-request"
      network: false
    model:
      preferred: "default"
  review:
    max_iterations: 2
    items:
    - id: "REV-HLD-001"
      source: "external-review"
      severity: "must"
      target: "outputs/HLD.md"
      issue: "HLD 必须包含数据流与 ADR。"
      expected_fix: "补齐数据流、ADR 和架构约束。"
      acceptance: "grep -q \"数据流\" outputs/HLD.md && grep -q \"ADR\" outputs/HLD.md"
verification:
  commands:
  - "test -s outputs/PRD.md"
  - "test -s outputs/HLD.md"
  - "grep -q \"HLD\" outputs/HLD.md"
  - "grep -q \"数据流\" outputs/HLD.md"
  - "grep -q \"ADR\" outputs/HLD.md"
reporting:
  include_evidence_refs: true
  handoff_required: true
package:
  env:
    path: "ENV"
    required: false
